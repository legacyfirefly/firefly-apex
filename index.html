<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FireflyApex | Legacy Holdings</title>
    
    <!-- Mobile App Settings -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FireflyApex">
    
    <!-- Premium Blue Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23020617'/%3E%3Ccircle cx='256' cy='256' r='180' fill='none' stroke='%231d4ed8' stroke-width='30'/%3E%3Cpath d='M256 120 L256 392 M120 256 L392 256' stroke='%2360a5fa' stroke-width='40' stroke-linecap='round'/%3E%3C/svg%3E">
    <link id="manifest-link" rel="manifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #020617 80%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .premium-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
        }

        .btn-apex {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3);
        }

        #install-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            z-index: 1000;
        }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-start mb-4">
        <div>
            <h1 class="text-3xl font-extrabold italic tracking-tighter uppercase">Firefly<span class="text-blue-500">Apex</span></h1>
            <p class="text-[8px] font-bold text-blue-400 tracking-[0.3em]">LEGACY HOLDINGS PROTOCOL</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold uppercase">M. Atkinson</p>
            <p class="text-[8px] text-blue-400">DEV-SEC-072</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center space-y-6">
        <div class="premium-card p-12 w-full text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-3 opacity-10"><i class="fa-solid fa-satellite-dish"></i></div>
            <i class="fa-solid fa-crosshairs text-blue-500 text-7xl mb-6 shadow-blue-500/50"></i>
            <h2 class="text-2xl font-black tracking-widest uppercase">System Active</h2>
            <p id="status-text" class="text-blue-300/40 text-[10px] uppercase mt-4 tracking-[0.2em]">Ready for Optimization</p>
        </div>
    </main>

    <footer class="mt-6 space-y-4">
        <div class="flex gap-2">
            <button onclick="window.open('https://wa.me/27725045344?text=FireflyApex%20Support')" class="flex-1 py-4 rounded-2xl premium-card text-green-400 font-bold text-[10px] tracking-widest flex items-center justify-center gap-2">
                <i class="fa-brands fa-whatsapp text-lg"></i> SUPPORT
            </button>
            <button onclick="shareApp()" class="flex-1 py-4 rounded-2xl premium-card text-blue-400 font-bold text-[10px] tracking-widest flex items-center justify-center gap-2">
                <i class="fa-solid fa-share-nodes text-lg"></i> INVITE USERS
            </button>
        </div>
        
        <button onclick="startPurge()" class="w-full py-5 rounded-2xl btn-apex font-black text-sm tracking-[0.25em] uppercase">
            Start 9-Step Purge
        </button>
    </footer>

    <!-- Install Banner -->
    <div id="install-banner" class="premium-card p-5 border-blue-500 bg-[#020617] shadow-2xl">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-xl shadow-lg">
                    <i class="fa-solid fa-crosshairs"></i>
                </div>
                <div>
                    <p class="text-sm font-bold">Install FireflyApex</p>
                    <p class="text-[9px] text-blue-400 uppercase">Pin to Home Screen</p>
                </div>
            </div>
            <button id="install-btn" class="bg-white text-blue-900 px-5 py-2 rounded-lg text-xs font-black uppercase">Add</button>
        </div>
    </div>

    <script>
        function startPurge() {
            const status = document.getElementById('status-text');
            status.innerText = "EXECUTING SYSTEM PURGE...";
            setTimeout(() => {
                const toast = document.createElement('div');
                toast.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-blue-600 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest z-[2000]";
                toast.innerText = "Optimization Complete. Firefly Shielding is active.";
                document.body.appendChild(toast);
                status.innerText = "SYSTEM: 100% OPTIMIZED";
                setTimeout(() => toast.remove(), 4000);
            }, 2500);
        }

        function shareApp() {
            const url = window.location.href;
            const text = encodeURIComponent(`🚀 *FireflyApex Deployment*\nOptimize your device and secure your data with the Legacy Holdings 9-Step Purge.\n\nAccess here: ${url}`);
            window.open(`https://wa.me/?text=${text}`);
        }

        // PWA Icon Logic
        const manifest = {
            "name": "FireflyApex", "short_name": "Firefly", "start_url": ".", "display": "standalone",
            "background_color": "#020617", "theme_color": "#1d4ed8",
            "icons": [{"src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23020617'/%3E%3Ccircle cx='256' cy='256' r='180' fill='none' stroke='%231d4ed8' stroke-width='30'/%3E%3Cpath d='M256 120 L256 392 M120 256 L392 256' stroke='%2360a5fa' stroke-width='40' stroke-linecap='round'/%3E%3C/svg%3E", "sizes": "512x512", "type": "image/svg+xml"}]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(blob));

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-banner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
